name: Transfer Limit Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
    paths:
      - "apps/*/src/runtime.ts"
      - "packages/fast-bridge-app/src/types/runtime.ts"
      - "tests/**"
      - "vitest.config.ts"
  push:
    branches: [master]
    paths:
      - "apps/*/src/runtime.ts"
      - "packages/fast-bridge-app/src/types/runtime.ts"
      - "tests/**"
      - "vitest.config.ts"

jobs:
  test-limits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test
